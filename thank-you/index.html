<!doctype html>
<html lang="en">
<head>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Received | Joshua Guerrero</title>
  <meta name="description" content="Your inquiry has been received. Joshua Guerrero will be in touch." />
  <link rel="canonical" href="https://drozq.com/thank-you/" />

  <meta property="og:title" content="Inquiry Received" />
  <meta property="og:url" content="https://drozq.com/thank-you/" />
  <meta property="og:type" content="website" />

  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" sizes="32x32" href="/flavicon.png" />

  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.70);
      --muted2:rgba(255,255,255,.50);
      --accent:#9900FF;
      --surface:#1c1c1e;
      --border:#2c2c2e;
      --shadow:0 22px 70px rgba(0,0,0,.72);
      --radius-lg:22px;
    }

    *{ box-sizing:border-box; }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:.5rem;
      padding:1.2rem 1.4rem 0.4rem;
      position:fixed;
      top:0;
      left:0;
      z-index:10;
      width:100%;
      pointer-events:none;
    }
    .topbar > a{ pointer-events:auto; }

    .back-link{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:.5rem;
      color:#fff;
      text-decoration:none;
      font-weight:600;
      letter-spacing:.01em;
      padding-bottom:.35rem;
      transition:opacity .2s ease;
    }
    .back-link::after{
      content:'';
      position:absolute;
      left:0;
      bottom:-0.35rem;
      height:2px;
      width:0;
      background:#fff;
      transition:width .2s ease-out;
    }
    .back-link:hover{ opacity:.55; }
    .back-link:hover::after{ width:100%; }
    .back-link span.arrow{ font-size:1.1rem; line-height:1; }

    .backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      z-index:1;
      pointer-events:none;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:2.2rem 2rem 5.6rem;
      position:relative;
      z-index:2;
    }

    .stack{
      width:min(640px, 100%);
      display:grid;
      gap:18px;
      text-align:center;
    }

    .page-title{
      margin:0;
      letter-spacing:-0.03em;
      line-height:1.05;
      font-weight:700;
      font-size:clamp(32px, 5.4vw, 66px);
      text-shadow:0 0 10px rgba(153,0,255,.18), 0 0 35px rgba(153,0,255,.12);
    }
    .accent{ color:var(--accent); }

    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow);
      padding:32px 28px;
      text-align:center;
    }

    .card p{
      margin:0 0 6px;
      color:var(--muted);
      font-size:15px;
      line-height:1.55;
      font-weight:500;
    }
    .card p:last-of-type{ margin-bottom:0; }

    .check{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:56px;
      height:56px;
      border-radius:50%;
      background:rgba(153,0,255,.14);
      margin-bottom:16px;
    }
    .check svg{
      width:28px;
      height:28px;
      stroke:var(--accent);
      stroke-width:2.5;
      fill:none;
    }

    .home-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:18px;
      border:none;
      border-radius:12px;
      padding:12px 24px;
      font-size:15px;
      font-weight:750;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
      text-decoration:none;
      box-shadow:0 12px 28px rgba(0,0,0,.45);
      transition:background .15s ease, transform .06s ease;
    }
    .home-btn:hover{ background:#a61aff; }
    .home-btn:active{ transform:translateY(1px); }

    /* Footer */
    footer.site-footer{
      position:fixed;
      left:0;right:0;bottom:0;
      z-index:5;
      background:rgba(0,0,0,.4);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      display:flex;
      justify-content:center;
      gap:2.5rem;
      padding:1.35rem 1.5rem 1.1rem;
      border-top:1px solid rgba(255,255,255,.06);
    }
    .footer-link{
      position:relative;
      color:#fff;
      text-decoration:none;
      font-weight:600;
      letter-spacing:.02em;
      cursor:pointer;
      padding-bottom:.35rem;
      transition:opacity .2s ease;
    }
    .footer-link::after{
      content:'';
      position:absolute;
      left:0;bottom:-0.35rem;
      height:2px;width:0;
      background:#fff;
      transition:width .2s ease-out;
    }
    .footer-link:hover{ opacity:.55; }
    .footer-link:hover::after{ width:100%; }

    @media (max-width: 540px){
      html,body{ overflow:auto; height:auto; }
      .topbar{
        position:sticky;top:0;left:0;width:100%;z-index:20;pointer-events:auto;
        padding:calc(env(safe-area-inset-top) + .9rem) 1.1rem .65rem;
        background:rgba(0,0,0,.55);
        backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
        border-bottom:1px solid rgba(255,255,255,.06);
      }
      .wrap{
        min-height:calc(100vh - 120px);
        place-items:center;
        padding:.9rem 1.1rem 0;
      }
      .card{ padding:24px 18px; }
      footer.site-footer{
        position:static;flex-wrap:wrap;justify-content:flex-start;
        gap:1rem 1.5rem;padding:1.1rem 1.4rem 1.4rem;
      }
      .footer-link{ font-size:.85rem; }
    }

    @media (max-height: 760px){
      html,body{ overflow:auto; height:auto; }
      footer.site-footer{ position:static; }
      .wrap{ padding-bottom:2rem; }
      .backdrop{ display:none; }
      .topbar{ position:static; width:auto; pointer-events:auto; }
    }
  </style>
</head>

<body>
  <div class="backdrop" aria-hidden="true"></div>

  <header class="topbar">
    <a href="/" class="back-link">
      <span class="arrow">←</span>
      <span>Return to Home</span>
    </a>
  </header>

  <main class="wrap">
    <div class="stack">
      <h1 class="page-title"><span class="accent">Received.</span></h1>

      <section class="card">
        <div class="check">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <p style="color:var(--fg); font-weight:600; font-size:17px; margin-bottom:10px;">
          We'll be in touch.
        </p>
        <p>Your inquiry has been submitted. Expect a response within one business day.</p>
        <a href="/" class="home-btn">Back to Home</a>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script>
    (function () {
      var target = document.getElementById('site-footer');
      if (!target) return;
      fetch('/footer.html', { cache: 'no-cache' })
        .then(function (res) {
          if (!res.ok) throw new Error('Failed to load footer');
          return res.text();
        })
        .then(function (html) { target.innerHTML = html; })
        .catch(function (err) { console.error('Footer load error:', err); });
    })();
  </script>
</body>
</html>
